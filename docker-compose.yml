version: '3.8'

services:
  app:
    build: .
    container_name: node_app
    restart: always
    ports:
      - "8010:8010"
    environment:
      - PORT=8010
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=
      - DB_PASS=
      - DB_NAME=
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm run migration:run && npm start"

  db:
    image: postgres:15
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      POSTGRES_DB: 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
